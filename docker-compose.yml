services:
  klipbord:
    image: ghcr.io/jeeftor/klipbord:latest
    ports:
      - "8080:8080"
    environment:
      BASE_URL: http://localhost:8080
      MAX_UPLOAD_MB: 2048
      # VISION_ENABLED: "true"
      # VISION_ENDPOINT: http://ollama:11434/v1/chat/completions
      # VISION_MODEL: llama3.2-vision
    volumes:
      - klipbord-data:/data   # named volume — persists across container updates
    restart: unless-stopped

volumes:
  klipbord-data:
